name: iOS Native Project Drift Check

# Guards the invariant from docs/migration/09-off-eas.md (9a): the committed app/ios/
# native project must always equal what `expo prebuild` would generate from
# app.config.js. If they diverge, Xcode Cloud silently builds a stale project.

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
  # `main` has no branch protection, so pushes land directly without ever going
  # through the pull_request trigger above — this is the only reason a stale ios/
  # (wrong OTA code-signing cert) shipped silently to Xcode Cloud once already.
  # Catching it here too is still after-the-fact (can't block a push that already
  # happened); ios/ci_scripts/ci_post_clone.sh is the gate that actually stops a
  # bad build from reaching TestFlight.
  push:
    branches: [main]
    paths:
      - "app/**"

jobs:
  drift-check:
    name: Check ios/ matches app.config.js
    runs-on: macos-14
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      # Intentionally NOT --clean: `expo prebuild -p ios --clean` wipes ios/ and
      # regenerates project.pbxproj with fresh random UUIDs every run (confirmed
      # non-deterministic even with zero config changes), which would make this
      # check fail on every PR regardless of drift. The incremental prebuild below
      # merges into the already-checked-out ios/ and is idempotent — verified stable
      # across repeated runs with no source changes.
      #
      # EXPO_PUBLIC_API_URL must match production (https://api.usepear.app) — the
      # native EXUpdatesURL is baked into the committed ios/ project at prebuild
      # time (Xcode Cloud builds the committed project directly, it does not run
      # prebuild), so both the commit and this check must use the same value or
      # they'll never agree. Regenerate locally the same way before committing:
      # `EXPO_PUBLIC_API_URL=https://api.usepear.app npx expo prebuild -p ios --clean`.
      - name: Regenerate native iOS project (incremental)
        env:
          EXPO_PUBLIC_API_URL: https://api.usepear.app
        run: npx expo prebuild -p ios

      - name: Fail on drift
        run: |
          if ! git diff --exit-code -- ios/; then
            echo "::error::Committed app/ios/ does not match 'expo prebuild -p ios' output. Regenerate locally with 'expo prebuild -p ios --clean' and commit ios/ after any app.config.js native change."
            exit 1
          fi

name: OTA Publish

# Publishes a JS-only OTA bundle to our self-hosted manifest server
# (docs/migration/09-off-eas.md, 9b "Publish side"). This is the FAST path: no
# native compile, ubuntu-latest only. scripts/export-ota-bundle.js runs Metro +
# Hermes over JS/assets — the native archive (Xcode Cloud, gated on `v*` tags)
# is a separate, slower pipeline.
#
# SCOPE: app/** only. Pure backend/infra changes must not fire this (mirrors the
# monorepo path-filter convention in build-test-deploy.yml, inverted: that
# pipeline ignores app/**, this one ignores everything else).
#
# AUTH: assumes the GitHub OIDC role `secrets.OIDC_ROLE_ARN` (same convention as
# build-test-deploy.yml) — no long-lived AWS keys. That role must additionally
# allow s3:PutObject/s3:List on the updates/ prefix of the media bucket,
# cloudfront:CreateInvalidation on the CDN distribution in front of it, and
# ssm:GetParameter(s)/secretsmanager:GetSecretValue on the OTA SSM params and
# secret (infra/modules/ec2_stack/ssm_params.tf's `github_oidc_ota_ci_read`
# policy grants this by role name — see that file for how the role is targeted
# without Terraform owning its lifecycle).
#
# REQUIRED repo config (Settings → Actions → Secrets): only
#   secrets.OIDC_ROLE_ARN
# remains. Everything else — media bucket, API base URL, CloudFront domain/
# distribution ID, the OTA secrets ARN, and the publish token + code-signing key
# inside it — is fetched at runtime from SSM Parameter Store + Secrets Manager;
# see infra/modules/ec2_stack/ssm_params.tf. Nothing here needs copy-pasting
# after a `terraform apply`.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
  workflow_dispatch:
    inputs:
      runtime_version:
        description: "Override runtime_version (CFBundleVersion) — defaults to ios/Pear/Info.plist's committed value. Only needed to re-publish against an older still-installed build."
        required: false
        type: string

env:
  AWS_REGION: us-east-1
  SSM_PREFIX: /pear/production/ota

jobs:
  export-and-publish:
    name: Export & Publish OTA Update
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch dynamic config (SSM + Secrets Manager)
        # Terraform owns every one of these values (infra/modules/ec2_stack/
        # ssm_params.tf) — nothing here is a repo var that could drift from a
        # `terraform apply`. The OTA secret's ARN is itself an SSM param, so this
        # job never needs to know the secret's name ahead of time.
        run: |
          S3_MEDIA_BUCKET=$(aws ssm get-parameter --name "${SSM_PREFIX}/s3_media_bucket" --query Parameter.Value --output text)
          API_BASE_URL=$(aws ssm get-parameter --name "${SSM_PREFIX}/api_base_url" --query Parameter.Value --output text)
          CLOUDFRONT_DOMAIN=$(aws ssm get-parameter --name "${SSM_PREFIX}/cloudfront_domain" --query Parameter.Value --output text)
          CLOUDFRONT_DISTRIBUTION_ID=$(aws ssm get-parameter --name "${SSM_PREFIX}/cloudfront_distribution_id" --query Parameter.Value --output text)
          OTA_SECRETS_ARN=$(aws ssm get-parameter --name "${SSM_PREFIX}/ota_secrets_arn" --query Parameter.Value --output text)

          UPDATES_PUBLISH_TOKEN=$(aws secretsmanager get-secret-value --secret-id "$OTA_SECRETS_ARN" --query SecretString --output text \
            | node -e 'let d="";process.stdin.on("data",c=>d+=c);process.stdin.on("end",()=>process.stdout.write(JSON.parse(d).UPDATES_PUBLISH_TOKEN))')

          echo "::add-mask::${UPDATES_PUBLISH_TOKEN}"

          echo "S3_MEDIA_BUCKET=${S3_MEDIA_BUCKET}" >> "$GITHUB_ENV"
          echo "API_BASE_URL=${API_BASE_URL}" >> "$GITHUB_ENV"
          echo "CLOUDFRONT_DOMAIN=${CLOUDFRONT_DOMAIN}" >> "$GITHUB_ENV"
          echo "CLOUDFRONT_DISTRIBUTION_ID=${CLOUDFRONT_DISTRIBUTION_ID}" >> "$GITHUB_ENV"
          echo "UPDATES_PUBLISH_TOKEN=${UPDATES_PUBLISH_TOKEN}" >> "$GITHUB_ENV"

      - name: Resolve runtime_version
        # Phase 6 of the off-Expo migration: runtime_version is now CFBundleVersion
        # (the build number), read straight from the committed ios/ project — this
        # repo has no Xcode Cloud automatic-versioning bump, CURRENT_PROJECT_VERSION
        # in the pbxproj and CFBundleVersion in Info.plist are both static committed
        # values, so what's checked out here is exactly what any Xcode Cloud archive
        # at this commit would produce. This replaces the old @expo/fingerprint
        # guardrail entirely — no separate check needed, since the manifest lookup
        # backend/app/platform/updates/queries.py does is keyed by
        # (runtime_version, channel, platform), which already structurally
        # guarantees an OTA bundle can never be served to an incompatible native
        # build. `workflow_dispatch` can still override for a manual out-of-band
        # publish (e.g. re-publishing against an older still-installed build).
        run: |
          if [ -n "${{ github.event.inputs.runtime_version }}" ]; then
            RUNTIME_VERSION="${{ github.event.inputs.runtime_version }}"
          else
            RUNTIME_VERSION=$(grep -A1 '<key>CFBundleVersion</key>' ios/Pear/Info.plist | tail -1 | sed -E 's/.*<string>(.*)<\/string>.*/\1/')
          fi

          if [ -z "$RUNTIME_VERSION" ]; then
            echo "::error::Could not resolve a runtime_version — checked workflow_dispatch input and ios/Pear/Info.plist's CFBundleVersion."
            exit 1
          fi

          echo "Publishing against runtime_version: ${RUNTIME_VERSION}"
          echo "RUNTIME_VERSION=${RUNTIME_VERSION}" >> "$GITHUB_ENV"
          echo "UPDATE_ID=$(node -e 'process.stdout.write(require("crypto").randomUUID())')" >> "$GITHUB_ENV"

      - name: Export JS bundle + assets
        env:
          APP_PUBLIC_API_URL: ${{ env.API_BASE_URL }}
        run: npm run export:ota

      - name: Upload bundle to S3
        run: |
          aws s3 sync dist/ "s3://${S3_MEDIA_BUCKET}/updates/${UPDATE_ID}/"

      - name: Register update
        # `POST /updates/publish` (backend/app/platform/updates/routes.py) — bearer-
        # token guarded (`requires_updates_publish_token`), inserts the app_updates
        # row directly (no RLS on that table, no task/worker indirection — see the
        # model's docstring).
        run: |
          ASSET_BASE_URL="https://${CLOUDFRONT_DOMAIN}/updates/${UPDATE_ID}"

          PAYLOAD=$(node scripts/build-ota-payload.js dist/bundle.hbc dist/assets "$ASSET_BASE_URL" "$RUNTIME_VERSION" production ios)

          HTTP_STATUS=$(curl -sS -o response.json -w '%{http_code}' \
            -X POST "${API_BASE_URL}/updates/publish" \
            -H "Authorization: Bearer ${UPDATES_PUBLISH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          cat response.json
          if [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::POST ${API_BASE_URL}/updates/publish returned ${HTTP_STATUS} — update ${UPDATE_ID} was NOT registered. Assets are already in s3://${S3_MEDIA_BUCKET}/updates/${UPDATE_ID}/, orphaned until this is retried."
            exit 1
          fi

      - name: Invalidate CloudFront cache
        # CloudFront is always provisioned (infra/modules/cloudfront_media, wired
        # into both ec2_stack and app_stack) — no unset-var no-op branch needed.
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
            --paths "/updates/${UPDATE_ID}/*"
